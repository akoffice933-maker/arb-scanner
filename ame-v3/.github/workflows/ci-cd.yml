name: AME v3.0 CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ame-v3/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'ame-v3/**'
  workflow_dispatch:
    # Manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ame-v3/requirements.txt
        pip install -r requirements-dev.txt

    - name: Create .env file
      run: |
        cp ame-v3/.env.example ame-v3/.env || echo "No .env.example found"

    - name: Lint with flake8
      run: |
        flake8 ame-v3/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 ame-v3/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      run: |
        black --check ame-v3/ --config .black.toml || true

    - name: Type check with mypy
      run: |
        mypy ame-v3/ --ignore-missing-imports || true

    - name: Run tests with pytest
      run: |
        pytest ame-v3/tests/ -v --cov=ame-v3 --cov-report=xml --cov-report=term-missing || true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: ame-v3
        name: codecov-ame-v3
        fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install safety
      run: |
        pip install safety bandit

    - name: Check dependencies for vulnerabilities
      run: |
        safety check -r ame-v3/requirements.txt --json || true

    - name: Run bandit security scan
      run: |
        bandit -r ame-v3/ -ll -f json -o ame-v3-bandit-report.json || true

    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ame-v3-bandit-security-report
        path: ame-v3-bandit-report.json
        retention-days: 7

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ame_v3_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r ame-v3/requirements.txt
        pip install pytest-asyncio

    - name: Run integration tests
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/ame_v3_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest ame-v3/tests/integration/ -v --asyncio || true

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build AME v3.0 image
      run: |
        docker build -t ame-v3:latest -f ame-v3/Dockerfile . || echo "Dockerfile not found"

    - name: Test Docker image
      run: |
        docker run --rm ame-v3:latest python -c "print('AME v3.0 build OK')" || true

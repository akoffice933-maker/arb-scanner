name: AME v3.0 CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ame-v3/**'
      - 'requirements*.txt'
  pull_request:
    branches: [ main ]
    paths:
      - 'ame-v3/**'
      - 'requirements*.txt'
  workflow_dispatch:
    # Manual trigger

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy

    - name: Lint with flake8
      run: |
        flake8 ame-v3/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 ame-v3/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      run: |
        black --check ame-v3/

    - name: Check imports with isort
      run: |
        isort --check-only ame-v3/ || true

    - name: Type check with mypy
      run: |
        mypy ame-v3/ --ignore-missing-imports || true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ame_v3_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ame-v3/requirements.txt
        pip install pytest pytest-asyncio pytest-cov

    - name: Create .env file
      run: |
        echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/ame_v3_test" > ame-v3/.env
        echo "REDIS_URL=redis://localhost:6379/0" >> ame-v3/.env

    - name: Run unit tests
      run: |
        pytest ame-v3/tests/ -v \
          --cov=ame-v3 \
          --cov-report=xml \
          --cov-report=term-missing \
          --tb=short

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-ame-v3
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install security tools
      run: |
        pip install safety bandit

    - name: Check dependencies for vulnerabilities
      run: |
        safety check -r ame-v3/requirements.txt --json || true

    - name: Run bandit security scan
      run: |
        bandit -r ame-v3/ -ll -f json -o ame-v3-bandit-report.json || true

    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ame-v3-bandit-security-report
        path: ame-v3-bandit-report.json
        retention-days: 7

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Check if Dockerfile exists
      id: check
      run: |
        if [ -f ame-v3/Dockerfile ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up Docker Buildx
      if: steps.check.outputs.exists == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      if: steps.check.outputs.exists == 'true'
      run: |
        docker build -t ame-v3:latest -f ame-v3/Dockerfile .

    - name: Test Docker image
      if: steps.check.outputs.exists == 'true'
      run: |
        docker run --rm ame-v3:latest python -c "print('AME v3.0 build OK')"
